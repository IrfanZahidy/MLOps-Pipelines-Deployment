name: Deploy CICD Model

on:
  push:
    branches: [ main ]        # runs every time you push to main
  pull_request:
    branches: [ main ]        # runs on pull requests to main
  
jobs:
  CICD_Deployment:
    runs-on: ubuntu-latest    # GitHub-hosted Linux runner (free)

    steps:
      # 1. Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Cache pip packages so repeat runs are faster
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      # 5. Run CodeQL analysis for security scanning
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3


  build:
    needs: [CICD_Deployment]
    runs-on: ubuntu-latest
    steps:
       # 6. Train the model — runs model.py
      - name: Train model
        run: python model.py

      # 7. Upload the saved plot and metrics as artefacts so you can download them from the GitHub Actions UI
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: model-results
          path: |
            #first one
            model_results.png
            training_history.png
            metrics.txt
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

            
  #9. Create a GitHub release with the trained model artefacts attached
  release: 
    needs: build
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # provided automatically by GitHub
    steps:
      - uses: actions/checkout@v3
      - uses: actions/download-artifact@v4
        with: { name: dist }
      - id: create_release
        uses: elgohr/Github-Release-Action@v5
        with:
          title: Dev Build ${{ github.sha }}
          tag: dev-${{ github.sha }}
          prerelease: true